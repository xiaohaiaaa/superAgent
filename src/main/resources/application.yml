server:
  port: 9900
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Spring Boot 配置
spring:
  servlet:
    # 配置文件上传大小限制
    multipart:
      max-file-size: 100MB  # 单个文件最大大小
      max-request-size: 100MB  # 整个请求最大大小
      enabled: true

  # Redis 配置 - 分布式 Session 存储
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-71b2bd43645542519b599bb8df4560a4}  # 从环境变量读取或使用默认值
      chat:
        options:
          timeout: 180000  # 超时时间180秒（3分钟）
      retry:
        max-attempts: 3  # 最大重试次数
        backoff:
          initial-interval: 2000  # 初始重试间隔2秒
          multiplier: 2  # 重试间隔倍数
          max-interval: 10000  # 最大重试间隔10秒

    # Spring AI MCP 客户端配置
    # 如果使用mock数据，请注释这部分内容
    mcp:
      client:
        enabled: true
        name: tencent-mcp-server
        version: 1.0.0
        request-timeout: 60s
        type: ASYNC
        sse:
          connections:
            tencent-cls:
              url: https://mcp-api.tencent-cloud.com
              sse-endpoint: /sse/b9e15e6dbbfd024b  # 完整的SSE端点路径

# 阿里云 DashScope Embedding API 配置
dashscope:
  api:
    key: ${DASHSCOPE_API_KEY:sk-71b2bd43645542519b599bb8df4560a4}  # 从环境变量读取或使用默认值（用于自定义配置）
  embedding:
    model: text-embedding-v4  # 阿里云文本向量化模型

# 文档分片配置
document:
  chunk:
    max-size: 800  # 每个分片最大字符数
    overlap: 100   # 分片之间的重叠字符数
    # 大文件分片策略
    large-file-threshold: 5MB  # 大文件阈值
    large-file-chunk-size: 600 # 大文件时分片大小减少以节省内存

# RAG 配置
rag:
  top-k: 3  # 检索返回的最相似文档数量
  model: "qwen3-max"  # 大语言模型名称

# 系统提示词配置
prompts:
  # 基础提示词（无 RAG 上下文）
  base: |
    你是一个专业的智能助手，可以获取当前时间、查询天气信息、搜索内部文档知识库，以及查询 Prometheus 告警信息。
    当用户询问时间相关问题时，使用 getCurrentDateTime 工具。
    当用户需要查询公司内部文档、流程、最佳实践或技术指南时，使用 queryInternalDocs 工具。
    当用户需要查询 Prometheus 告警、监控指标或系统告警状态时，使用 queryPrometheusAlerts 工具。
    当用户需要查询腾讯云日志时，请调用腾讯云mcp服务查询,默认查询地域ap-guangzhou,查询时间范围为近一个月。

  # 前置 RAG 模式提示词（包含知识库检索上下文）
  prerag: |
    你是一个专业的智能助手，可以获取当前时间、查询天气信息、搜索内部文档知识库，以及查询 Prometheus 告警信息。
    当用户询问时间相关问题时，使用 getCurrentDateTime 工具。
    当用户需要查询 Prometheus 告警、监控指标或系统告警状态时，使用 queryPrometheusAlerts 工具。
    当用户需要查询腾讯云日志时，请调用腾讯云mcp服务查询,默认查询地域ap-guangzhou,查询时间范围为近一个月。

    --- 内部文档知识库（已为您检索）---
    {rag_context}
    --- 知识库内容结束 ---

    【重要】请优先参考上述检索到的文档内容回答用户问题。文档内容已包含在上下文中，请基于这些信息回答问题。如果文档中没有相关信息，请基于你的通用知识回答。

  # 对话历史格式化模板
  history: |
    --- 对话历史 ---
    {history}
    --- 对话历史结束 ---

  # 结尾提示
  ending: 请基于以上检索到的文档内容和对话历史，回答用户的新问题。

# Prometheus 配置
prometheus:
  base-url: http://localhost:9090
  timeout: 10  # 超时时间（秒）
  mock-enabled: true  # 是否启用 Mock 模式（用于测试）

# CLS 云日志服务配置
cls:
  mock-enabled: true  # 是否启用 Mock 模式（用于测试，设为 true 返回与告警关联的模拟日志数据）

milvus:
  #host: 192.168.1.106
  host: localhost

# Session 配置
session:
  ttl-seconds: 86400  # 会话 TTL，默认 24 小时
  max-window-size: 10  # 最大历史消息对数（每对包含 user+assistant 两条）
