# Prometheus Configuration for AI Ops Testing
# 用于测试多 Agent 告警分析功能

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alert_rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Mock Metrics Server (模拟业务服务)
  - job_name: 'mock-app'
    static_configs:
      - targets: ['localhost:9100']
    metrics_path: /metrics
    scrape_interval: 15s

  # Spring Boot Actuator (暴露应用指标)
  - job_name: 'spring-boot-app'
    static_configs:
      - targets: ['localhost:9900']
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
